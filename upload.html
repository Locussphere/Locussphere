<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Mod - ModHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="upload-page">
    <!-- Header -->
    <header class="upload-header">
        <button class="cancel-btn" onclick="window.history.back()">Cancel</button>
        <h1 class="page-title">Upload Mod</h1>
    </header>

    <div class="upload-container">
        <form id="uploadForm">
            <!-- File Upload Area -->
            <div class="file-upload-area" id="fileUploadArea">
                <div class="upload-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h3>Tap to browse files</h3>
                <p>Max size 100MB. .zip, .rar supported.</p>
                <input type="file" id="fileInput" accept=".zip,.rar" hidden>
            </div>

            <!-- Mod Title -->
            <div class="form-group">
                <label for="modTitle">Mod Title</label>
                <input type="text" id="modTitle" placeholder="e.g. Ultra HD Textures" required>
            </div>

            <!-- Game Category -->
            <div class="form-group">
                <label for="gameCategory">Game Category</label>
                <div class="select-wrapper">
                    <select id="gameCategory" required>
                        <option value="">Select Game</option>
                        <option value="RPG">RPG</option>
                        <option value="FPS">FPS</option>
                        <option value="Racing">Racing</option>
                        <option value="Cyberpunk 2077">Cyberpunk 2077</option>
                        <option value="Terraria">Terraria</option>
                        <option value="Other">Other</option>
                    </select>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>
            </div>

            <!-- Mod Type -->
            <div class="form-group">
                <label>Mod Type</label>
                <div class="type-buttons">
                    <button type="button" class="type-btn active" data-type="Graphic">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
                            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
                            <path d="M2 2l7.586 7.586"></path>
                            <circle cx="11" cy="11" r="2"></circle>
                        </svg>
                        Graphic
                    </button>
                    <button type="button" class="type-btn" data-type="Gameplay">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="6" y1="2" x2="6" y2="6"></line>
                            <line x1="18" y1="2" x2="18" y2="6"></line>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <path d="M8 16a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2z"></path>
                            <path d="M22 16a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2z"></path>
                        </svg>
                        Gameplay
                    </button>
                    <button type="button" class="type-btn" data-type="Audio">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                        Audio
                    </button>
                    <button type="button" class="type-btn" data-type="Map">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                            <line x1="8" y1="2" x2="8" y2="18"></line>
                            <line x1="16" y1="6" x2="16" y2="22"></line>
                        </svg>
                        Map
                    </button>
                    <button type="button" class="type-btn" data-type="Script">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg>
                        Script
                    </button>
                </div>
                <input type="hidden" id="modType" value="Graphic" required>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="modDescription">Description</label>
                <textarea id="modDescription" rows="5" placeholder="Describe your mod changes, version notes, or installation instructions..." required></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                Upload Mod
            </button>
        </form>
    </div>

    <script src="upload.js"></script>
</body>
</html>
